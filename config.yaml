# DeerFlow Configuration
# Generated by 'make setup' on 2026-07-06
# Run 'make setup' to reconfigure, or edit this file for advanced options.
# Full reference: config.example.yaml

config_version: 18
log_level: info
logging:
  enhance:
    enabled: false
    format: text
token_usage:
  enabled: true
token_budget:
  enabled: false
  max_tokens: 200000
  max_input_tokens: null
  max_output_tokens: null
  warn_threshold: 0.8
  hard_stop_threshold: 1.0
max_recursion_limit: 1000
models:
- name: openrouter
  display_name: OpenRouter (Gemini 2.0 Flash Lite Free)
  use: langchain_openai:ChatOpenAI
  model: google/gemini-2.0-flash-lite-preview-02-05:free
  api_key: $OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1

tool_groups:
- name: web
- name: file:read
- name: file:write
- name: bash
tools:
- name: web_search
  use: deerflow.community.ddg_search.tools:web_search_tool
  group: web
  max_results: 5
- name: web_fetch
  use: deerflow.community.jina_ai.tools:web_fetch_tool
  group: web
  timeout: 10
- name: image_search
  group: web
  use: deerflow.community.image_search.tools:image_search_tool
  max_results: 5
- name: ls
  group: file:read
  use: deerflow.sandbox.tools:ls_tool
- name: read_file
  group: file:read
  use: deerflow.sandbox.tools:read_file_tool
- name: glob
  group: file:read
  use: deerflow.sandbox.tools:glob_tool
  max_results: 200
- name: grep
  group: file:read
  use: deerflow.sandbox.tools:grep_tool
  max_results: 100
- name: write_file
  use: deerflow.sandbox.tools:write_file_tool
  group: file:write
- name: str_replace
  use: deerflow.sandbox.tools:str_replace_tool
  group: file:write
- name: bash
  use: deerflow.sandbox.tools:bash_tool
  group: bash
tool_search:
  enabled: false
tool_output:
  enabled: true
  externalize_min_chars: 12000
  preview_head_chars: 2000
  preview_tail_chars: 1000
  fallback_max_chars: 30000
  fallback_head_chars: 8000
  fallback_tail_chars: 3000
  storage_subdir: .tool-results
  exempt_tools:
  - read_file
  - read_file_tool
suggestions:
  enabled: true
loop_detection:
  enabled: true
  warn_threshold: 3
  hard_limit: 5
  window_size: 20
  max_tracked_threads: 100
  tool_freq_warn: 30
  tool_freq_hard_limit: 50
read_before_write:
  enabled: true
safety_finish_reason:
  enabled: true
uploads:
  max_files: 10
  max_file_size: 52428800
  max_total_size: 104857600
  auto_convert_documents: false
  pdf_converter: auto
sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  allow_host_bash: true
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
  ls_output_max_chars: 20000
  bash_command_timeout: 600
skills:
  container_path: /mnt/skills
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null
summarization:
  enabled: true
  model_name: null
  trigger:
  - type: tokens
    value: 32000
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: null
  skill_file_read_tool_names:
  - read_file
  - read
  - view
  - cat
memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000
  token_counting: tiktoken
  guaranteed_categories:
  - correction
  guaranteed_token_budget: 500
agents_api:
  enabled: true
skill_evolution:
  enabled: false
  moderation_model_name: null
database:
  backend: sqlite
  sqlite_dir: .deer-flow/data
run_events:
  backend: memory
  max_trace_content: 10240
  track_token_usage: true
scheduler:
  enabled: true
  poll_interval_seconds: 5
  lease_seconds: 120
  max_concurrent_runs: 3
  min_once_delay_seconds: 60
channel_connections:
  enabled: true
  telegram:
    enabled: true
  slack:
    enabled: true
  discord:
    enabled: true
  feishu:
    enabled: true
  dingtalk:
    enabled: true
  wechat:
    enabled: true
  wecom:
    enabled: true
